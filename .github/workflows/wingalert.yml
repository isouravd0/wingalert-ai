name: WingAlert AI

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:

  monitor:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: 20

      - run: npm install playwright

      - run: npx playwright install chromium

      - run: node index.js

      - uses: actions/upload-artifact@v4
        with:
        name: indigo-page
        path: indigo.png
